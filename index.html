<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

  <div class="landing-wrap">
    <div class="landing-app-brand">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="14" fill="url(#lg)"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#1a56db"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs>
        <rect x="13" y="9" width="20" height="26" rx="2" fill="white" opacity="0.15"/>
        <rect x="15" y="11" width="16" height="22" rx="1.5" fill="white"/>
        <line x1="19" y1="16" x2="27" y2="16" stroke="#1a56db" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="19" y1="20" x2="25" y2="20" stroke="#1a56db" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="19" y1="24" x2="23" y2="24" stroke="#1a56db" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="37" cy="37" r="11" fill="#10b981"/>
        <path d="M33 37l3 3 7-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="landing-app-name">InvoiceMePro</div>
    </div>

    <div class="landing-card">
      <div class="landing-tagline" id="landing-tagline"></div>

      <a href="client.html" class="landing-btn">Pay Here</a>

      <p class="landing-sub">Have an invoice? Click above to enter your passcode and pay securely.</p>

      <!-- Hidden manager access dot -->
      <a href="manager.html" class="manager-dot" title="Manager access"></a>
    </div>
  </div>

  <script>
    fetch('/api/get-business-profile')
      .then(r => r.json())
      .then(biz => {
        document.title = biz.name || 'InvoiceMePro';
        if (biz.tagline) document.getElementById('landing-tagline').textContent = biz.tagline;
      })
      .catch(() => {});
  </script>
</body>
</html>
