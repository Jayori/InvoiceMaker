<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

  <div class="landing-wrap">
    <div class="landing-card">
      <div class="landing-logo" id="landing-biz-name">Loading...</div>
      <div class="landing-tagline" id="landing-tagline"></div>

      <a href="client.html" class="landing-btn">Pay Here</a>

      <p class="landing-sub">Have an invoice? Click above to enter your passcode and pay securely.</p>

      <!-- Hidden manager access dot -->
      <a href="manager.html" class="manager-dot" title="Manager access"></a>
    </div>
  </div>

  <script>
    fetch('/api/get-business-profile')
      .then(r => r.json())
      .then(biz => {
        document.getElementById('landing-biz-name').textContent = biz.name || 'Invoice Pro';
        document.title = biz.name || 'Invoice Pro';
        if (biz.tagline) document.getElementById('landing-tagline').textContent = biz.tagline;
      })
      .catch(() => {
        document.getElementById('landing-biz-name').textContent = 'Invoice Pro';
      });
  </script>
</body>
</html>
